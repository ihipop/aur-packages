name: Sync Local Changes to AUR

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      manual_commit_msg:
        description: 'AUR 提交信息 (手动干预时必填)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-local:
    if: |
      github.actor != 'github-actions[bot]' && 
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package:
          - name: proxyman-bin
            path: packages/proxyman-bin
          - name: ipinfo-cli-bin
            path: packages/ipinfo-cli-bin

    steps:
      - name: Install system dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring ca-certificates
          pacman -Syu --noconfirm git openssh curl jq binutils fakeroot pacman-contrib rsync sudo
          git config --global --add safe.directory "*"
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          # 回推 GitHub
          token: ${{ secrets.GITHUB_TOKEN }}

      # Push 触发时运行变动检测
      - name: Check if package directory changed
        id: changed-files
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v44
        with:
          files: |
            ${{ matrix.package.path }}/**

      # 判定是否变化的逻辑
      - name: Determine if sync is needed
        id: should-sync
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing sync."
            echo "sync=true" >> $GITHUB_OUTPUT
            {
              echo "final_msg<<EOF"
              echo "${{ github.event.inputs.manual_commit_msg }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]; then
            echo "Changes detected in ${{ matrix.package.path }}."
            echo "sync=true" >> $GITHUB_OUTPUT
            
            # 使用更健壮的方式从原始事件 JSON 文件解析提交信息
            echo "Debug: Searching commits for path [${{ matrix.package.path }}]"
            mapfile -t COMMIT_LIST < <(jq -r ".commits[] | 
              select((.added + .modified + .removed)[] | startswith(\"${{ matrix.package.path }}\")) | 
              \"\(.id[0:7]) \(.message | split(\"\n\")[0])\"" "$GITHUB_EVENT_PATH" | sort -u)
            
            COUNT=${#COMMIT_LIST[@]}
            
            if [ "$COUNT" -eq 0 ]; then
               # 回退到简单的 git log
               TITLE="sync ${{ matrix.package.name }} from GitHub"
               BODY=""
            elif [ "$COUNT" -eq 1 ]; then
              # 单个提交
              TITLE=$(echo "${COMMIT_LIST[0]}" | cut -d' ' -f2-)
              BODY=""
            else
              # 多个提交：合并标题，并列出清单
              TITLE=$(printf "%s\n" "${COMMIT_LIST[@]}" | cut -d' ' -f2- | paste -sd ';' - | sed 's/;/; /g')
              BODY=$(echo -e "\nIncluded commits:")
              for commit in "${COMMIT_LIST[@]}"; do
                BODY=$(echo -e "$BODY\n- $commit")
              done
            fi

            {
              echo "final_msg<<EOF"
              echo "$TITLE"
              if [ -n "$BODY" ]; then
                echo "$BODY"
              fi
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No changes, skipping."
            echo "sync=false" >> $GITHUB_OUTPUT
          fi

      # 自动修复校验和与 .SRCINFO
      - name: Auto-fix checksums and .SRCINFO
        if: steps.should-sync.outputs.sync == 'true'
        run: |
          chown -R builder:builder .
          cd ./${{ matrix.package.path }}
          sudo -u builder updpkgsums
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

      - name: Setup SSH for AUR
        if: steps.should-sync.outputs.sync == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Setup SSH Known Hosts
        if: steps.should-sync.outputs.sync == 'true'
        run: |
          touch /etc/ssh/ssh_known_hosts
          ssh-keyscan aur.archlinux.org >> /etc/ssh/ssh_known_hosts

      # 同步并推送到 AUR
      - name: Sync and Push to AUR
        if: steps.should-sync.outputs.sync == 'true'
        run: |
          # 提取最新的提交者信息
          AUTHOR_NAME=$(git log -1 --pretty="%an")
          AUTHOR_EMAIL=$(git log -1 --pretty="%ae")
          AUR_COMMIT_MSG="${{ steps.should-sync.outputs.final_msg }}"
          
          AUR_CLONE_DIR="/tmp/aur-repo-${{ matrix.package.name }}"
          git clone ssh://aur@aur.archlinux.org/${{ matrix.package.name }}.git "$AUR_CLONE_DIR"
          
          cd ./${{ matrix.package.path }}
          # 使用 rsync 进行镜像同步，--delete 确保 AUR 侧多余的文件被清理
          rsync -av --delete --exclude=".git/" ./ "$AUR_CLONE_DIR/"
          # 拷贝并合并 .gitignore (全局在前，本地在后，确保本地规则优先级更高)
          cp "$GITHUB_WORKSPACE/packages/.gitignore" "$AUR_CLONE_DIR/.gitignore"
          if [ -f ".gitignore" ]; then
            echo -e "\n# --- Package Specific Rules ---" >> "$AUR_CLONE_DIR/.gitignore"
            cat ".gitignore" >> "$AUR_CLONE_DIR/.gitignore"
          fi
         
          cd "$AUR_CLONE_DIR"
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          git add -A
          
          if ! git diff-index --quiet HEAD; then
            echo "Pushing to AUR with author: $AUTHOR_NAME"
            git commit -m "$AUR_COMMIT_MSG"
            git push origin master
          else
            echo "No actual changes to commit for AUR."
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          cd "$GITHUB_WORKSPACE"
          # 检查是否有文件改动
          if ! git diff --quiet ./${{ matrix.package.path }}; then
            echo "Detected changes. Pushing back to GitHub with [skip ci]..."
            git add ./${{ matrix.package.path }}
            git commit -m "chore(${{ matrix.package.name }}): auto-fix [skip ci]"
            git pull --rebase origin master
            git push origin master
          else
            echo "No changes needed."
          fi
