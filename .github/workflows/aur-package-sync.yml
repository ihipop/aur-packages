name: Sync Local Changes to AUR

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      manual_commit_msg:
        description: 'AUR 提交信息 (手动干预时必填)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync-local:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package:
          - name: proxyman-bin
            path: packages/proxyman-bin
          - name: ipinfo-cli-bin
            path: packages/ipinfo-cli-bin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master

      # 1. Push 触发时运行变动检测
      - name: Check if package directory changed
        id: changed-files
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v44
        with:
          files: |
            ${{ matrix.package.path }}/**

      # 2. 核心判定逻辑
      - name: Determine if sync is needed
        id: should-sync
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger detected. Forcing sync."
            echo "sync=true" >> $GITHUB_OUTPUT
            {
              echo "final_msg<<EOF"
              echo "${{ github.event.inputs.manual_commit_msg }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.changed-files.outputs.any_changed }}" == "true" ]; then
            echo "Changes detected in ${{ matrix.package.path }}."
            echo "sync=true" >> $GITHUB_OUTPUT
            
            # 计算变动范围
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"
            
            # 检查 BEFORE_SHA 是否在当前历史中有效
            if [ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ] || \
               [ -z "$BEFORE_SHA" ] || \
               ! git rev-parse --verify "$BEFORE_SHA" >/dev/null 2>&1; then
                echo "Before SHA is invalid (force push or first push). Using last commit only."
                RANGE="HEAD^1..HEAD"
            else
                RANGE="$BEFORE_SHA..$AFTER_SHA"
            fi
            
            # 提取相关提交并统计数量
            mapfile -t COMMIT_LIST < <(git log --reverse --format='%h %s' "$RANGE" -- "${{ matrix.package.path }}")
            COUNT=${#COMMIT_LIST[@]}
            
            if [ "$COUNT" -eq 1 ]; then
              # 单个提交：直接使用原始标题
              TITLE=$(echo "${COMMIT_LIST[0]}" | cut -d' ' -f2-)
              BODY=""
            else
              # 多个提交：拼接标题，并附带详细列表
              TITLE=$(git log --reverse --format='%s' "$RANGE" -- "${{ matrix.package.path }}" | paste -sd ';' - | sed 's/;/; /g')
              BODY=$(echo -e "\nIncluded commits:")
              for commit in "${COMMIT_LIST[@]}"; do
                BODY=$(echo -e "$BODY\n- $commit")
              done
            fi

            {
              echo "final_msg<<EOF"
              echo "$TITLE"
              if [ -n "$BODY" ]; then
                echo "$BODY"
              fi
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "No changes, skipping."
            echo "sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH for AUR
        if: steps.should-sync.outputs.sync == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Setup SSH Known Hosts
        if: steps.should-sync.outputs.sync == 'true'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Sync and Push to AUR
        if: steps.should-sync.outputs.sync == 'true'
        run: |
          # 提取最新的提交者信息
          AUTHOR_NAME=$(git log -1 --pretty="%an")
          AUTHOR_EMAIL=$(git log -1 --pretty="%ae")
          AUR_COMMIT_MSG="${{ steps.should-sync.outputs.final_msg }}"
          
          AUR_CLONE_DIR="/tmp/aur-repo-${{ matrix.package.name }}"
          git clone ssh://aur@aur.archlinux.org/${{ matrix.package.name }}.git "$AUR_CLONE_DIR"
          
          cd ./${{ matrix.package.path }}
          # 使用 rsync 进行镜像同步，--delete 确保 AUR 侧多余的文件被清理
          rsync -av --delete --exclude=".git/" ./ "$AUR_CLONE_DIR/"
          # 拷贝并合并 .gitignore (全局在前，本地在后，确保本地规则优先级更高)
          cp "$GITHUB_WORKSPACE/packages/.gitignore" "$AUR_CLONE_DIR/.gitignore"
          if [ -f ".gitignore" ]; then
            echo -e "\n# --- Package Specific Rules ---" >> "$AUR_CLONE_DIR/.gitignore"
            cat ".gitignore" >> "$AUR_CLONE_DIR/.gitignore"
          fi
         
          cd "$AUR_CLONE_DIR"
          git config user.name "$AUTHOR_NAME"
          git config user.email "$AUTHOR_EMAIL"
          git add -A
          
          if ! git diff-index --quiet HEAD; then
            echo "Pushing to AUR with author: $AUTHOR_NAME"
            git commit -m "$AUR_COMMIT_MSG"
            git push origin master
          else
            echo "No actual changes to commit for AUR."
          fi