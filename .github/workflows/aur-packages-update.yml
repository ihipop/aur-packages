name: Check and Update AUR Packages

on:
  schedule:
    - cron: "0 1 * * 1" # Weekly on Monday at 09:00 UTC+8 (01:00 UTC)
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-versions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: proxyman-bin
            path: packages/proxyman-bin
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup nvchecker
        run: |
          pip install nvchecker

      - name: Check for new version
        id: check
        working-directory: ./${{ matrix.package.path }}
        env:
          NVCHECKER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用 nvchecker 获取最新版本
          LATEST_VER=$(nvchecker --logger json -c .nvchecker.toml | jq -r 'select(.event == "updated" or .event == "up-to-date") | .version')
          
          if [ -z "$LATEST_VER" ] || [ "$LATEST_VER" == "null" ]; then
            echo "Error: nvchecker failed to find a version."
            exit 1
          fi
          
          LOCAL_VER=$(grep -P '^\s*pkgver\s*=\s*' .SRCINFO | sed 's/.*= //')
          
          if [ "$LATEST_VER" != "$LOCAL_VER" ]; then
            echo "MATCH=true" >> $GITHUB_ENV
            # 生成信号文件，包含该包的所有上下文
            echo "{\"name\": \"${{ matrix.package.name }}\", \"path\": \"${{ matrix.package.path }}\", \"latest\": \"$LATEST_VER\"}" > ../${{ matrix.package.name }}_upd.json
          else
            echo "MATCH=false" >> $GITHUB_ENV
          fi

      - name: Upload Signal
        if: env.MATCH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sig-${{ matrix.package.name }}
          path: ${{ matrix.package.name }}_upd.json
          retention-days: 1

  prepare-deploy:
    needs: check-versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      any_update: ${{ steps.build.outputs.any_update }}
    steps:
      - name: Download all signals
        uses: actions/download-artifact@v4
        with:
          path: signals
          pattern: sig-*
          merge-multiple: true
        continue-on-error: true # 如果没有任何更新，这一步会失败，所以需要忽略

      - name: Build Dynamic Matrix
        id: build
        run: |
          if [ -d "signals" ] && [ "$(ls -A signals)" ]; then
            JSON=$(cat signals/*.json | jq -s -c '.')
            echo "matrix=$JSON" >> $GITHUB_OUTPUT
            echo "any_update=true" >> $GITHUB_OUTPUT
          else
            echo "matrix=[]" >> $GITHUB_OUTPUT
            echo "any_update=false" >> $GITHUB_OUTPUT
          fi

  deploy-updates:
    needs: prepare-deploy
    if: needs.prepare-deploy.outputs.any_update == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        package: ${{ fromJson(needs.prepare-deploy.outputs.matrix) }}
    steps:
      - name: Install system dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring ca-certificates
          pacman -Syu --noconfirm git openssh curl jq binutils fakeroot pacman-contrib sudo

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 强制 ref: master 确保每一个 Job 开始前都通过 fetch 获取最新的 HEAD，避免 Push 冲突。
          ref: master

      - name: Prepare build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder

      - name: Update PKGBUILD and .SRCINFO
        working-directory: ./${{ matrix.package.path }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ matrix.package.latest }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          
          chown -R builder .
          sudo -u builder updpkgsums
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

      - name: Setup SSH for AUR
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Setup SSH Known Hosts
        run: |
          touch /etc/ssh/ssh_known_hosts
          ssh-keyscan aur.archlinux.org >> /etc/ssh/ssh_known_hosts
      - name: Commit and Push to AUR and GitHub
        working-directory: ./${{ matrix.package.path }}
        run: |
          ORIG_DIR=$(pwd)
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory '*'

          echo "Cloning AUR repository for ${{ matrix.package.name }}..."
          AUR_CLONE_DIR="/tmp/aur-repo-${{ matrix.package.name }}"
          git clone ssh://aur@aur.archlinux.org/${{ matrix.package.name }}.git $AUR_CLONE_DIR
          
          echo "Syncing PKGBUILD and .SRCINFO to AUR..."
          cp -av PKGBUILD .SRCINFO "$AUR_CLONE_DIR/"
          
          cd $AUR_CLONE_DIR
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          
          if ! git diff-index --quiet HEAD; then
            echo "Pushing changes to AUR..."
            git commit -m "Update to ${{ matrix.package.latest }}"
            git push origin master
          else
            echo "No changes detected for AUR."
          fi

          echo "AUR sync successful. Now pushing changes to GitHub..."
          cd $ORIG_DIR # 回到原工作目录 (package path)
          git add PKGBUILD .SRCINFO
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(${{ matrix.package.name }}): update to ${{ matrix.package.latest }}"
            git pull --rebase origin master
            git push origin master
          else
            echo "No changes to commit for GitHub."
          fi